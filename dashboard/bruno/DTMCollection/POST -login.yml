info:
  name: POST /login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/login"
  body:
    type: json
    data: |-
      {
        "username": "{{user}}",
        "password": "{{password}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var data = res.getBody();
            if (data.token) {
              bru.setEnvVar("adminToken", data.token);
            }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
