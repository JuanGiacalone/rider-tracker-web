info:
  name: POST /location
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/location"
  body:
    type: json
    data: |2-
          {
            "name": "New Terminal Branch",
            "lat": -38.0000,
            "lng": -57.5500
          }
  auth:
    type: bearer
    token: "{{adminToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
